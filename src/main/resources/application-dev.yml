server:
  port: 8080

spring:
  application:
    name: bank-account-service

  datasource:
    url: jdbc:h2:mem:testdb
    username: h2
    password: password
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
