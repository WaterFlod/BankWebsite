<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ru" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bank | Личный кабинет</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/account.css}" type="text/css">
    <link rel="stylesheet" th:href="@{/css/style.css}" type="text/css">
</head>
<body>

<canvas id="wave-canvas"></canvas>

<header class="header">
    <div class="container">
        <div class="navbar">
            <a th:href="@{/home}" class="logo">Bank</a>
            <div class="nav-links">
                <a th:href="@{/product/debit}">Карты</a>
                <a th:href="@{/product/credit}">Кредиты</a>
                <a th:href="@{/product/savings}">Накопления</a>
            </div>
            <div class="username" sec:authorize="isAuthenticated()">
                <a th:text="${username}" th:href="@{/account}"></a>
                <form method="post" th:action="@{/logout}" class="logout">
                    <button class="btn-outline" type="submit">Выйти</button>
                </form>
            </div>
            <div class="auth-buttons" sec:authorize="isAnonymous()">
                <form method="get" th:action="@{/login}">
                    <button class="btn-primary" >Войти</button>
                </form>
            </div>
        </div>
    </div>
</header>

<main>
    <div class="container">
        <div class="dashboard-header">
            <div class="section-title">
                <i class="fas fa-wallet"></i> Ваши транзакции
            </div>
        </div>

        <div class="recent-section">
            <div class="recent-title">
                <i class="fas fa-history"></i>Последние операции
            </div>
            <div class="transaction-list" th:each="trnsc : ${transactions}">
                <div class="transaction-item">
                    <div class="transaction-info">
                        <div>
                            <div class="transaction-desc" th:text="${trnsc.description}"></div>
                            <div class="transaction-date" th:text="${trnsc.timestamp}"></div>
                        </div>
                    </div>
                    <div class="transaction-amount" th:switch="${trnsc.type.name()}">
                        <div class="deposit" th:case="'DEPOSIT'">
                            +<span th:text="${trnsc.amount}"></span> ₽
                        </div>
                        <div class="deposit" th:case="'TRANSFER_OUT'">
                            +<span th:text="${trnsc.amount}"></span> ₽
                        </div>
                        <div class="withdrawal" th:case="'WITHDRAWAL'">
                            -<span th:text="${trnsc.amount}"></span> ₽
                        </div>
                        <div class="withdrawal" th:case="'TRANSFER_IN'">
                            -<span th:text="${trnsc.amount}"></span> ₽
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="footer">
    <div class="container">
        <div class="copyright">
            © Bank — является вымышленным продуктом.
        </div>
    </div>
</footer>

<script type="text/javascript" th:src="@{/js/script.js}"></script>
</body>
</html>
