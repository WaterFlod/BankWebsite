<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ru" >
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Банк</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/register.css}" type="text/css">
    <link rel="stylesheet" th:href="@{/css/style.css}" type="text/css">
</head>
<body>

<canvas id="wave-canvas"></canvas>

<main>
    <div class="container">
        <div class="hero">
            <h1>Установите пароль для входа</h1>
        </div>
    </div>

    <div class="registration-section">
        <div class="container">
            <div class="form-container"><h2 class="form-title">Введите пароль</h2>

                <form th:object="${request}" method="post" th:action="@{/auth/set-password}">

                    <div th:if="${error}" th:text="${error}" class="error"></div>

                    <div class="input-group">
                        <label><i class="fas fa-lock"></i> Пароль</label>
                        <input type="password" th:field="*{password}" placeholder="Не менее 8 символов" required\>
                        <span class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
                        <span th:if="${confirmError}" th:text="${confirmError}" class="field-error"></span>
                    </div>

                    <div class="input-group">
                        <label><i class="fas fa-check-circle"></i> Подтверждение пароля</label>
                        <input type="password" th:field="*{confirmPassword}" id="confirmPassword" placeholder="Повторите пароль" required>
                        <span class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></span>
                        <span th:if="${confirmError}" th:text="${confirmError}" class="field-error"></span>
                    </div>

                    <button type="submit" class="register-btn">Установить пароль</button>

                    <div class="badge">
                        <i class="fas fa-shield-alt"></i> Защищено технологией шифрования
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<footer class="footer">
    <div class="container">
        <div class="copyright">
            © Bank — является вымышленным продуктом.
        </div>
    </div>
</footer>

<script type="text/javascript" th:src="@{/js/script.js}"></script>
</body>
</html>
